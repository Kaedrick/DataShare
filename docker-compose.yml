services:
  postgres:
    image: postgres:16
    container_name: datashare_postgres
    environment:
      POSTGRES_DB: datasharedb
      POSTGRES_USER: postgres
    ports:
      - "5434:5432"
    volumes:
      - datashare_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adeluser -d datasharedb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  datashare_pgdata:
